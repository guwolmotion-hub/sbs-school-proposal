<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>수강생 관리 | SBS아카데미컴퓨터아트학원 구월지점</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
:root{--navy:#0f1f3d;--blue:#1d3d6e;--accent:#3a7bd5;--accent2:#e8562a;--bg:#f0f4fa;--card:#fff;--border:#e0e6f0;--text:#1a2540;--sub:#6b7a99;--sw:256px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
/* SIDEBAR */
.sb{width:var(--sw);min-height:100vh;background:linear-gradient(180deg,#080f1e 0%,#0d1a30 60%,#0f2040 100%);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;overflow-y:auto}
.sb-brand{padding:26px 20px 22px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo{display:flex;align-items:center;gap:11px;margin-bottom:5px}
.sb-logo-mark{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#3a7bd5,#60a5fa);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sb-logo-text{font-size:12px;font-weight:800;color:#fff;line-height:1.4}
.sb-point{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px}
.sb-sec{padding:18px 20px 8px;font-size:10px;font-weight:700;color:rgba(255,255,255,.28);letter-spacing:1.8px;text-transform:uppercase}
.sb-items{padding:0 10px 10px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;transition:all .18s;text-decoration:none;margin-bottom:1px}
.sb-item:hover{background:rgba(255,255,255,.07)}
.sb-item.active{background:rgba(58,123,213,.25)}
.sb-item-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sb-item-name{font-size:13px;font-weight:500;color:rgba(255,255,255,.65)}
.sb-item:hover .sb-item-name,.sb-item.active .sb-item-name{color:#fff}
.sb-foot{margin-top:auto;padding:16px 10px;border-top:1px solid rgba(255,255,255,.07)}
.sb-foot-link{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;color:rgba(255,255,255,.45);font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;transition:all .18s;margin-bottom:2px}
.sb-foot-link:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
/* MAIN */
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:13px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 8px rgba(15,31,61,.05)}
.content{padding:28px 32px 64px;flex:1}
/* HERO */
.hero-main{border-radius:18px;background:linear-gradient(135deg,#0a1628 0%,#0f2245 45%,#1a3a7a 100%);padding:36px 40px;margin-bottom:22px;position:relative;overflow:hidden}
.hero-glow{position:absolute;top:-60px;right:-30px;width:280px;height:280px;background:radial-gradient(circle,rgba(58,123,213,.22),transparent 65%);pointer-events:none}
.hero-badge{display:inline-block;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:600;color:rgba(255,255,255,.85);margin-bottom:12px}
.hero-title-main{font-size:26px;font-weight:800;color:#fff;line-height:1.3;margin-bottom:8px}
.hero-title-main em{font-style:normal;color:#60a5fa}
.hero-sub-main{font-size:13px;color:rgba(255,255,255,.55);line-height:1.8}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:10px;padding:8px 16px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#2d6bc4;box-shadow:0 4px 12px rgba(58,123,213,.4)}
.btn-ghost{background:rgba(255,255,255,.13);color:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.22)}.btn-ghost:hover{background:rgba(255,255,255,.22)}
.btn-outline{background:var(--card);color:var(--sub);border:1px solid var(--border)}.btn-outline:hover{color:var(--accent);border-color:var(--accent);background:#eaf3ff}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:8px}
.btn-danger{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}.btn-danger:hover{background:#fee2e2}
/* WRAP */
.wrap{max-width:1100px;margin:0 auto;padding:0}
/* TABS */
.tabs{display:flex;gap:8px;margin-bottom:22px}
.tab{padding:10px 26px;border-radius:12px;border:2px solid var(--border);background:var(--card);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--sub)}
.tab.ta{background:linear-gradient(135deg,#1d3d6e,#3a7bd5);color:#fff;border-color:transparent;box-shadow:0 4px 16px rgba(58,123,213,.3)}
.tab.te{background:linear-gradient(135deg,#7b1d1d,#e8562a);color:#fff;border-color:transparent;box-shadow:0 4px 16px rgba(232,86,42,.3)}
.tcnt{display:inline-block;background:rgba(255,255,255,.25);border-radius:20px;padding:1px 9px;font-size:12px;margin-left:5px}
.tab:not(.ta):not(.te) .tcnt{background:var(--bg);color:var(--sub)}
/* SUBTABS */
.subtabs{display:flex;gap:8px;margin-bottom:18px}
.subtab{padding:8px 22px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--sub)}
.subtab.sta{background:linear-gradient(135deg,#1d3d6e,#3a7bd5);color:#fff;border-color:transparent;box-shadow:0 3px 12px rgba(58,123,213,.3)}
.subtab.ste{background:linear-gradient(135deg,#7b1d1d,#e8562a);color:#fff;border-color:transparent;box-shadow:0 3px 12px rgba(232,86,42,.3)}
.subtab.str{background:linear-gradient(135deg,#065f46,#059669);color:#fff;border-color:transparent;box-shadow:0 3px 12px rgba(5,150,105,.3)}
/* YEAR/MONTH NAV */
.ym-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.ym-label{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.4px;text-transform:uppercase;white-space:nowrap;margin-right:2px}
.ybtn,.mbtn{padding:6px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--sub)}
.ybtn:hover,.mbtn:hover{border-color:var(--accent);color:var(--accent)}
.ybtn.ya{background:linear-gradient(135deg,#1d3d6e,#3a7bd5);color:#fff;border-color:transparent;box-shadow:0 2px 10px rgba(58,123,213,.3)}
.mbtn.ma{background:linear-gradient(135deg,#3a7bd5,#60a5fa);color:#fff;border-color:transparent;box-shadow:0 2px 10px rgba(58,123,213,.25)}
.scnt{display:inline-block;background:rgba(255,255,255,.25);border-radius:20px;padding:1px 8px;font-size:11px;margin-left:4px}
.subtab:not(.sta):not(.ste) .scnt{background:var(--bg);color:var(--sub)}
/* TABLE */
.tbl-wrap{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:0 2px 16px rgba(15,31,61,.08);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
thead th{background:var(--navy);color:rgba(255,255,255,.85);font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:12px 16px;text-align:left}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f0f4ff}
tbody td{padding:13px 16px;font-size:14px;vertical-align:middle}
.sname{font-weight:700;font-size:15px;color:var(--accent);text-decoration:underline;text-underline-offset:3px}
.mentor-txt{color:var(--sub);font-size:13px}
/* BADGES */
.badge{display:inline-block;padding:4px 11px;border-radius:20px;font-size:12px;font-weight:600}
.b-plan{background:#eaf3ff;color:#2563eb}.b-making{background:#fff3e0;color:#d97706}
.b-revise{background:#fef3f2;color:#dc2626}.b-done{background:#ecfdf5;color:#059669}
.b-present{background:#ecfdf5;color:#059669}.b-absent{background:#fef3f2;color:#dc2626}
.b-holiday{background:#fef9c3;color:#854d0e}.b-pending{background:#f3f4f6;color:#9ca3af}
.b-none{background:#f3f4f6;color:#9ca3af}
.b-employ{background:#ecfdf5;color:#059669}.b-transfer{background:#eaf3ff;color:#2563eb}
/* PROGRESS */
.prog-wrap{display:flex;align-items:center;gap:8px}
.prog-bar{flex:1;background:#e8edf5;border-radius:99px;height:6px;min-width:60px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#3a7bd5,#60a5fa)}
.prog-fill-e{background:linear-gradient(90deg,#e8562a,#f97316)}
.prog-pct{font-size:12px;color:var(--sub);font-weight:600;white-space:nowrap}
/* STUDENT DETAIL */
.detail-hero{padding:36px 28px 28px;color:#fff;position:relative;border-radius:0}
.detail-hero.ha{background:linear-gradient(135deg,#1d3d6e,#3a7bd5)}
.detail-hero.he{background:linear-gradient(135deg,#7b1d1d,#e8562a)}
.hero-tag{display:inline-block;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:600;margin-bottom:10px}
.hero-name{font-size:30px;font-weight:700;margin-bottom:5px}
.hero-mentor{font-size:13px;color:rgba(255,255,255,.7)}
.hero-actions{position:absolute;top:20px;right:20px;display:flex;gap:8px}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--sub);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:18px;padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;text-decoration:none;box-shadow:0 1px 6px rgba(15,31,61,.06)}
.back:hover{color:var(--accent);border-color:var(--accent);background:#eaf3ff}
/* INFO GRID */
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.icard{background:var(--card);border-radius:13px;padding:16px 18px;box-shadow:0 2px 12px rgba(15,31,61,.07);border:1px solid var(--border)}
.icard label{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--sub);display:block;margin-bottom:7px}
.icard .val{font-size:15px;font-weight:600}
/* PROGRESS CARD */
.prog-card{background:var(--card);border-radius:13px;padding:18px 20px;box-shadow:0 2px 12px rgba(15,31,61,.07);border:1px solid var(--border);margin-bottom:16px}
.prog-card label{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--sub);display:block;margin-bottom:10px}
.prog-card-row{display:flex;align-items:center;gap:14px}
.big-pct{font-size:28px;font-weight:700;color:var(--accent);min-width:60px}
.prog-card input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer;height:6px}
/* CLASS DAYS */
.sec-label{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--sub);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.sec-label hr{flex:1;border:none;border-top:1px solid var(--border)}
.day-card{background:var(--card);border-radius:13px;border:1px solid var(--border);margin-bottom:8px;overflow:hidden;box-shadow:0 1px 6px rgba(15,31,61,.05)}
.day-hd{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;transition:background .15s}
.day-hd:hover{background:#f8faff}
.day-date{font-size:14px;font-weight:700}
.day-num{font-size:11px;color:var(--sub);background:var(--bg);padding:2px 8px;border-radius:20px;font-weight:600}
.att-btns{display:flex;gap:5px;margin-left:auto}
.att-btn{padding:4px 9px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid transparent;cursor:pointer;transition:all .15s;opacity:.4}
.att-btn.active{opacity:1;transform:scale(1.06)}
.att-btn.p{background:#ecfdf5;color:#059669;border-color:#059669}
.att-btn.a{background:#fef3f2;color:#dc2626;border-color:#dc2626}
.att-btn.h{background:#fef9c3;color:#854d0e;border-color:#fde047}
.day-chevron{color:var(--sub);font-size:16px;margin-left:6px;transition:transform .2s;display:inline-block}
.day-chevron.open{transform:rotate(180deg)}
.day-body{display:none;padding:14px 16px;border-top:1px solid var(--border)}
.day-body.open{display:block}
/* FEEDBACK */
.fb-text{width:100%;min-height:85px;border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;font-family:inherit;font-size:13px;color:var(--text);resize:vertical;outline:none;transition:border-color .2s;background:#fafbfe;line-height:1.6}
.fb-text:focus{border-color:var(--accent);background:#fff}
.fb-toolbar{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap;align-items:center}
.fb-toolbar span{font-size:12px;color:var(--sub);margin-right:2px}
/* MEDIA */
.media-list{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.media-item{border:1px solid var(--border);border-radius:10px;overflow:hidden;position:relative;background:var(--card)}
.media-item img{width:100%;max-height:260px;object-fit:cover;display:block}
.yt-wrap{width:100%;aspect-ratio:16/9;background:#000}
.yt-wrap iframe{width:100%;height:100%;border:none;display:block}
.link-card{padding:11px 14px;display:flex;align-items:center;gap:10px;background:#f8faff}
.link-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;flex-shrink:0}
.link-card a{color:var(--accent);font-size:13px;font-weight:600;text-decoration:none;word-break:break-all}
.link-card a:hover{text-decoration:underline}
.link-title{font-size:12px;color:var(--sub);margin-top:2px}
.media-del{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;z-index:2}
.media-del:hover{background:rgba(220,38,38,.8)}
.img-caption{padding:7px 12px;font-size:12px;color:var(--sub);background:#f8faff;border-top:1px solid var(--border)}
/* ABSENT OVERLAY */
.day-absent-msg{padding:12px;background:#fef3f2;border-radius:8px;font-size:13px;color:#dc2626;text-align:center}
.day-holiday-msg{padding:12px;background:#fef9c3;border-radius:8px;font-size:13px;color:#854d0e;text-align:center}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,31,61,.5);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:20px;width:500px;max-width:94vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(15,31,61,.3);animation:pop .2s ease}
@keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.modal-hd{padding:20px 22px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-hd h3{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--sub);line-height:1;padding:2px 6px}
.modal-body{padding:18px 22px 22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--sub);margin-bottom:5px;letter-spacing:.3px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;background:#fafbfe}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:#fff}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-foot{padding:0 22px 18px;display:flex;justify-content:flex-end;gap:8px}
/* TOAST */
#toast{position:fixed;bottom:22px;right:22px;background:var(--navy);color:#fff;padding:11px 18px;border-radius:11px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(15,31,61,.3);z-index:400;display:none;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--sub)}
.empty p{font-size:28px;margin-bottom:8px}.empty span{font-size:14px}
/* FILE INPUT */
.file-input-wrap{margin-bottom:0}
.file-input-wrap input[type=file]{width:100%;padding:9px 10px;border:1.5px dashed var(--border);border-radius:10px;font-family:inherit;font-size:13px;cursor:pointer;background:#fafbfe;color:var(--sub)}
.file-input-wrap input[type=file]:hover{border-color:var(--accent);background:#eaf3ff}
.divider-or{text-align:center;color:var(--sub);font-size:12px;margin:10px 0;position:relative}
.divider-or::before,.divider-or::after{content:'';position:absolute;top:50%;width:44%;height:1px;background:var(--border)}
.divider-or::before{left:0}.divider-or::after{right:0}
.img-preview{width:100%;max-height:160px;object-fit:cover;border-radius:8px;margin-top:8px;display:none}
/* ROW ACTIONS */
.row-del{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:7px;padding:4px 9px;font-size:12px;cursor:pointer;font-weight:600}
.row-del:hover{background:#fee2e2}
/* LOADING OVERLAY */
#loading-overlay{position:fixed;inset:0;background:rgba(15,31,61,.92);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading-spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.2);border-top-color:#3a7bd5;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:rgba(255,255,255,.7);font-size:14px;font-weight:500}
@media(max-width:960px){:root{--sw:210px}.content{padding:20px 20px 52px}}
@media(max-width:700px){
  .sb{display:none}.main{margin-left:0}.content{padding:16px 14px 48px}
  .info-grid{grid-template-columns:1fr 1fr}.detail-hero{padding:26px 18px 22px}
  .hero-name{font-size:24px}
  .field-row{grid-template-columns:1fr}
}
@media print{nav,.sb{display:none!important}.main{margin-left:0}*{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style>
</head>
<body>
<aside class="sb" id="sidebar">
  <div class="sb-brand">
    <div class="sb-logo">
      <div class="sb-logo-mark">🎓</div>
      <div class="sb-logo-text">SBS아카데미<br>컴퓨터아트학원</div>
    </div>
    <div class="sb-point">구월지점</div>
  </div>
  <div class="sb-sec">학과</div>
  <div class="sb-items" id="sb-dept-list"></div>
  <div class="sb-foot">
    <a href="main.html" class="sb-foot-link"><span>🏠</span> 홈</a>
    <a href="portfolio.html" class="sb-foot-link"><span>🎬</span> 포트폴리오</a>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div style="font-size:13px;color:var(--sub);font-weight:600">수강생 관리</div>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="today" style="font-size:13px;color:var(--sub);font-weight:500"></span>
      <button class="btn btn-primary btn-sm" onclick="openAddStudent()">+ 학생 추가</button>
    </div>
  </div>
  <div class="content">
    <div class="hero-main">
      <div class="hero-glow"></div>
      <div class="hero-badge">수강생 관리</div>
      <div class="hero-title-main">학과별 <em>수강생 현황</em></div>
      <div class="hero-sub-main">출결 · 피드백 · 진행률을 한 곳에서 관리하세요</div>
    </div>
    <div id="app"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-box"></div>
</div>
<div id="toast"></div>

/* ═══════ DB (Firebase Firestore) ═══════ */
(function(){try{firebase.initializeApp(FIREBASE_CONFIG);}catch(e){if(!/already exists/.test(e.message))throw e;}})();
const _db=firebase.firestore();
let _storage=null;try{_storage=firebase.storage();}catch(e){console.warn('Storage 비활성화됨 - 파일 업로드 불가');}


const DB={
  _cache:null,

  get(){return this._cache?JSON.parse(JSON.stringify(this._cache)):{students:[]};},

  save(d){
    if(!this._cache){this._cache=d;return d;}
    const prev=this._cache.students||[];
    this._cache=d;
    const cur=d.students||[];
    const changed=cur.filter(s=>{const o=prev.find(x=>x.id===s.id);return!o||JSON.stringify(o)!==JSON.stringify(s);});
    const deleted=prev.filter(s=>!cur.find(x=>x.id===s.id));
    changed.forEach(s=>{_db.collection('sbs_students').doc(s.id).set(JSON.parse(JSON.stringify(s))).catch(()=>showToast('저장 오류 발생'));});
    deleted.forEach(s=>{_db.collection('sbs_students').doc(s.id).delete().catch(console.error);});
    return d;
  },

  async _seed(data){
    const batch=_db.batch();
    data.students.forEach(s=>{batch.set(_db.collection('sbs_students').doc(s.id),JSON.parse(JSON.stringify(s)));});
    await batch.commit();
  },

  async load(){
    const snapshot=await _db.collection('sbs_students').get();
    if(snapshot.empty){
      let data;
      const ls=localStorage.getItem('sbs_mgr_v1');
      if(ls){
        try{
          data=JSON.parse(ls);
          data.students.forEach(s=>{
            if(s.feedback)Object.keys(s.feedback).forEach(dt=>{
              if(s.feedback[dt].media)s.feedback[dt].media=s.feedback[dt].media.filter(m=>m.url&&!m.url.startsWith('data:'));
            });
          });
        }catch(e){data=null;}
      }
      if(!data)data=JSON.parse(JSON.stringify(SEED));
      data.students.forEach(s=>{
        if(!s.dept)s.dept=DEPT_MAP[s.id]||'영상/모션2D';
        if(!s.days)s.days=JSON.parse(JSON.stringify(BASE_DAYS));
        if(!s.portfolio)s.portfolio=[];
        if(!s.year)s.year=2026;
        if(!s.month)s.month=3;
      });
      this._cache=data;
      await this._seed(data);
    }else{
      this._cache={students:snapshot.docs.map(doc=>{
        const s=doc.data();
        if(!s.dept)s.dept=DEPT_MAP[s.id]||'영상/모션2D';
        if(!s.days)s.days=JSON.parse(JSON.stringify(BASE_DAYS));
        if(!s.portfolio)s.portfolio=[];
        if(!s.year)s.year=2026;
        if(!s.month)s.month=3;
        return s;
      })};
    }
    return this._cache;
  },

  reset(){
    const data=JSON.parse(JSON.stringify(SEED));
    data.students.forEach(s=>{
      if(!s.dept)s.dept=DEPT_MAP[s.id]||'영상/모션2D';
      if(!s.days)s.days=JSON.parse(JSON.stringify(BASE_DAYS));
      if(!s.portfolio)s.portfolio=[];
      if(!s.year)s.year=2026;
      if(!s.month)s.month=3;
    });
    this._cache=data;
    this._seed(data);
    return data;
  }
};

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function nl2br(s){return esc(s).replace(/\n/g,'<br>')}
function ytId(url){const m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/);return m?m[1]:null}
function showToast(msg,ms=2200){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>{t.style.display='none'},ms)}

let _dbt={};
function debounce(key,fn,ms=800){clearTimeout(_dbt[key]);_dbt[key]=setTimeout(fn,ms)}

function renderDayCard(s,day,num){
  const id=s.id;
  const isHoliday=day.holiday;
  const attRaw=isHoliday?'holiday':(s.attendance[day.date]||'pending');
  const fb=s.feedback[day.date]||{text:'',media:[]};
  const isOpen=EXPANDED.has(day.date+'-'+id);
  const isE=s.type==='employ';

  const attBtns=['present','absent','holiday'].map(a=>
    `<button class="att-btn ${a.charAt(0)} ${attRaw===a?'active':''}" onclick="setAtt('${esc(id)}','${esc(day.date)}','${a}',event)">${ATT_LABEL[a]}</button>`
  ).join('');

  let bodyContent='';
  if(isHoliday||attRaw==='holiday'){
    bodyContent=`<div class="day-holiday-msg">🌸 휴강일</div>`;
  }else if(attRaw==='absent'){
    bodyContent=`<div class="day-absent-msg">결석</div>`;
  }else{
    const mediaHtml=(fb.media||[]).map((m,idx)=>renderMediaItem(m,idx,id,day.date)).join('');
    bodyContent=`
      <textarea class="fb-text" id="fbt-${esc(id)}-${esc(day.date)}"
        oninput="debounce('${esc(id)}-${esc(day.date)}',()=>autoSaveFb('${esc(id)}','${esc(day.date)}'),900)"
        placeholder="피드백 내용을 입력하세요...">${esc(fb.text||'')}</textarea>
      <div class="fb-toolbar">
        <button class="btn btn-primary btn-sm" onclick="saveFbNow('${esc(id)}','${esc(day.date)}')">💾 저장</button>
        <span style="margin-left:4px">첨부:</span>
        <button class="btn btn-outline btn-sm" onclick="openAddImage('${esc(id)}','${esc(day.date)}')">🖼 이미지</button>
        <button class="btn btn-outline btn-sm" onclick="openAddVideo('${esc(id)}','${esc(day.date)}')">▶️ 영상</button>
        <button class="btn btn-outline btn-sm" onclick="openAddLink('${esc(id)}','${esc(day.date)}')">🔗 링크</button>
      </div>
      ${mediaHtml?`<div class="media-list">${mediaHtml}</div>`:''}`;
  }

  return `<div class="day-card">
    <div class="day-hd" onclick="toggleDay('${esc(day.date)}','${esc(id)}')">
      <span class="day-date">${day.date} ${day.day}</span>
      <span class="day-num">${num}일차</span>
      <div class="att-btns" onclick="event.stopPropagation()">${attBtns}</div>
      <span class="day-chevron ${isOpen?'open':''}">⌄</span>
    </div>
    <div class="day-body ${isOpen?'open':''}" id="dayb-${esc(day.date)}-${esc(id)}">${bodyContent}</div>
  </div>`;
}

function renderMediaItem(m,idx,sid,date){
  const del=`<button class="media-del" onclick="removeMedia('${esc(sid)}','${esc(date)}',${idx})" title="삭제">✕</button>`;
  if(m.type==='image') return `<div class="media-item">${del}<img src="${esc(m.url)}" onerror="this.src=''" alt="${esc(m.caption||'')}"><div class="img-caption">${esc(m.caption||'이미지')}</div></div>`;
  if(m.type==='video'){
    const vid=ytId(m.url);
    if(vid) return `<div class="media-item">${del}<div class="yt-wrap"><iframe src="https://www.youtube.com/embed/${vid}" allowfullscreen></iframe></div>${m.title?`<div class="img-caption">${esc(m.title)}</div>`:''}</div>`;
    if(m.url.startsWith('data:video/')||/\.(mp4|webm|mov|avi)$/i.test(m.url))
      return `<div class="media-item">${del}<video src="${esc(m.url)}" controls style="width:100%;max-height:300px;background:#000;display:block"></video>${m.title?`<div class="img-caption">${esc(m.title)}</div>`:''}</div>`;
    return `<div class="media-item">${del}<div class="link-card"><div class="link-icon">▶</div><div><a href="${esc(m.url)}" target="_blank">${esc(m.title||m.url)}</a></div></div></div>`;
  }
  if(m.type==='link') return `<div class="media-item">${del}<div class="link-card"><div class="link-icon">🔗</div><div><a href="${esc(m.url)}" target="_blank">${esc(m.title||m.url)}</a>${m.desc?`<div class="link-title">${esc(m.desc)}</div>`:''}</div></div></div>`;
  return '';
}

function toggleDay(date,sid){
  const key=date+'-'+sid;
  EXPANDED.has(key)?EXPANDED.delete(key):EXPANDED.add(key);
  const b=document.getElementById(`dayb-${date}-${sid}`);
  const c=b?.previousElementSibling?.querySelector('.day-chevron');

function saveNewStudent(){
  const name=document.getElementById('f-name').value.trim();
  const mentor=document.getElementById('f-mentor').value.trim();
  if(!name||!mentor){alert('이름과 담당 멘토는 필수입니다.');return;}
  const id='s'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  const newDept=document.getElementById('f-dept').value;
  const ct=document.getElementById('f-type').value;
  const type=ct==='admission'?'admission':'employ';
  const goal=ct==='employ'?'취업':ct==='transfer'?'편입':null;
  const newYear=parseInt(document.getElementById('f-year').value)||2026;
  const newMonth=parseInt(document.getElementById('f-month').value)||4;
  const d=DB.get();
  const DAY_NAMES=['일','월','화','수','목','금','토'];
  const days=[],fb={},att={};
  for(let i=1;i<=8;i++){
    const dateVal=(document.getElementById('fd-'+i).value||'').trim();
    if(!dateVal)continue;
    const parts=dateVal.split('-');
    const m=parseInt(parts[0]),day=parseInt(parts[1]);
    const dow=new Date(newYear,m-1,day).getDay();
    days.push({date:dateVal,day:DAY_NAMES[dow],holiday:false});
    att[dateVal]='pending';
    fb[dateVal]={text:'',media:[]};
  }
  d.students.push({
    id,name,dept:newDept,type,goal,year:newYear,month:newMonth,
    mentor,age:parseInt(document.getElementById('f-age').value)||0,
    contact:document.getElementById('f-contact').value.trim(),
    topic:document.getElementById('f-topic').value.trim()||'미정',
    stage:document.getElementById('f-stage').value,pct:0,
    days,attendance:att,feedback:fb
  });
  DB.save(d);closeModal();TAB=newDept;YEAR=newYear;MONTH=newMonth;
  SUBTAB=ct==='admission'?'admission':ct==='transfer'?'transfer':'employ';
  renderList();showToast(`${name} 수강생 추가됨`);
}

function saveNewClassDay(sid){
  const date=document.getElementById('cd-date').value.trim();
  const day=document.getElementById('cd-day').value.trim();
  if(!date||!day){alert('날짜와 요일을 입력하세요.');return;}
  const holiday=document.getElementById('cd-holiday').value==='1';
  const d=DB.get();
  const s=d.students.find(x=>x.id===sid);
  if(!s)return;
  if(!s.days)s.days=[];
  if(s.days.find(x=>x.date===date)){alert('이미 존재하는 날짜입니다.');return;}
  s.days.push({date,day,holiday});
  s.days.sort((a,b)=>a.date.localeCompare(b.date));
  if(!s.attendance[date])s.attendance[date]=holiday?'holiday':'pending';
  if(!s.feedback[date])s.feedback[date]={text:'',media:[]};
  DB.save(d);closeModal();showToast(`${date} 수업일 추가됨`);
  EXPANDED.add(date+'-'+sid);

function _commitMedia(sid,date,item,file){
  if(file){
    showToast('업로드 중...',60000);
    const fd=new FormData();
    fd.append('file',file);
    fd.append('upload_preset','Portfolio');
    const rt=file.type.startsWith('video/')?'video':'image';
    fetch('https://api.cloudinary.com/v1_1/ditmabkad/'+rt+'/upload',{method:'POST',body:fd})
      .then(r=>r.json())
      .then(data=>{
        if(data.error)throw new Error(data.error.message);
        item.url=data.secure_url;
        _doCommitMedia(sid,date,item);
      })
      .catch(e=>showToast('업로드 실패: '+e.message,5000));
  }else{
    _doCommitMedia(sid,date,item);
  }
}
function _doCommitMedia(sid,date,item){
  const d=DB.get();
  const s=d.students.find(x=>x.id===sid);
  if(!s){showToast('오류: 학생을 찾을 수 없습니다');return;}
  if(!s.feedback[date])s.feedback[date]={text:'',media:[]};
  s.feedback[date].media.push(item);
  DB.save(d);
  closeModal();
  EXPANDED.add(date+'-'+sid);
  renderStudentDetail(sid);showToast('추가됨 ✓');
}

function saveMedia(sid,date,type){
  if(type==='image'){
    const fileInput=document.getElementById('mi-file');
    const url=(document.getElementById('mi-url').value||'').trim();
    const cap=document.getElementById('mi-cap').value.trim();
    if(fileInput&&fileInput.files&&fileInput.files[0]){
      _commitMedia(sid,date,{type:'image',url:'',caption:cap},fileInput.files[0]);
    }else if(url){
      _commitMedia(sid,date,{type:'image',url,caption:cap});
    }else{alert('파일을 선택하거나 URL을 입력하세요.');}
  }else if(type==='video'){
    const fileInput=document.getElementById('mv-file');
    const url=document.getElementById('mv-url').value.trim();
    const title=document.getElementById('mv-title').value.trim();
    if(fileInput&&fileInput.files&&fileInput.files[0]){
      _commitMedia(sid,date,{type:'video',url:'',title:title||fileInput.files[0].name},fileInput.files[0]);
    }else if(url){
      _commitMedia(sid,date,{type:'video',url,title});
    }else{alert('파일을 선택하거나 URL을 입력하세요.');}
  }else{
    const url=document.getElementById('ml-url').value.trim();
    const title=document.getElementById('ml-title').value.trim();
    if(!url||!title){alert('URL과 제목을 입력하세요.');return;}
    _commitMedia(sid,date,{type:'link',url,title,desc:document.getElementById('ml-desc').value.trim()});
  }
}

/* ═══════ INIT ═══════ */
async function initApp(){
  // 날짜 표시
  const now=new Date();
  const days=['일','월','화','수','목','금','토'];
  const todayEl=document.getElementById('today');
  if(todayEl)todayEl.textContent=now.getFullYear()+'년 '+(now.getMonth()+1)+'월 '+now.getDate()+'일 ('+days[now.getDay()]+')';

  const overlay=document.getElementById('loading-overlay');
  overlay.style.display='flex';
  try{
    await DB.load();
    overlay.style.display='none';
    var navDept=localStorage.getItem('sbs_nav_dept');
    if(navDept&&DEPTS.indexOf(navDept)!==-1){TAB=navDept;localStorage.removeItem('sbs_nav_dept');}
    initSidebar();
    window.addEventListener('hashchange',renderApp);
    renderApp();
  }catch(e){
    overlay.innerHTML='<div style="text-align:center;padding:40px"><div style="font-size:36px;margin-bottom:16px">⚠️</div><div style="color:#fff;font-size:18px;font-weight:600;margin-bottom:8px">Firebase 연결 오류</div><div style="color:rgba(255,255,255,.6);font-size:13px;max-width:320px;line-height:1.6">'+e.message+'</div><div style="color:rgba(255,255,255,.4);font-size:12px;margin-top:12px">firebase-config.js 설정을 확인하세요</div></div>';
    console.error(e);
  }
}
initApp();
</script>
