<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>포트폴리오 | SBS아카데미 구월점</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--navy:#0f1f3d;--blue:#1d3d6e;--accent:#3a7bd5;--bg:#f4f6fb;--card:#fff;--border:#e0e6f0;--text:#1a2540;--sub:#6b7a99}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* HEADER */
.hd{background:linear-gradient(135deg,var(--navy),var(--blue));padding:16px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(15,31,61,.35);position:sticky;top:0;z-index:50}
.hd-left h1{color:#fff;font-size:17px;font-weight:700}
.hd-left p{color:rgba(255,255,255,.55);font-size:12px;margin-top:2px}
.hd-right{display:flex;gap:8px;align-items:center}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:10px;padding:8px 16px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;text-decoration:none}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#2d6bc4;box-shadow:0 4px 12px rgba(58,123,213,.35)}
.btn-ghost{background:rgba(255,255,255,.13);color:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.22)}.btn-ghost:hover{background:rgba(255,255,255,.22)}
.btn-outline{background:var(--card);color:var(--sub);border:1px solid var(--border)}.btn-outline:hover{color:var(--accent);border-color:var(--accent);background:#eaf3ff}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:8px}
/* WRAP */
.wrap{max-width:1200px;margin:0 auto;padding:26px 22px 60px}
/* TABS */
.tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:12px;border:2px solid var(--border);background:var(--card);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--sub)}
.tab.ta{background:linear-gradient(135deg,#1d3d6e,#3a7bd5);color:#fff;border-color:transparent;box-shadow:0 4px 16px rgba(58,123,213,.3)}
.tcnt{display:inline-block;background:rgba(255,255,255,.25);border-radius:20px;padding:1px 9px;font-size:12px;margin-left:5px}
.tab:not(.ta) .tcnt{background:var(--bg);color:var(--sub)}
/* GALLERY GRID */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.gallery-item{position:relative;border-radius:14px;overflow:hidden;aspect-ratio:16/9;background:#1a2540;cursor:pointer;box-shadow:0 4px 18px rgba(15,31,61,.18);transition:box-shadow .25s}
.gallery-item:hover{box-shadow:0 8px 32px rgba(15,31,61,.28)}
.gallery-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.gallery-item:hover img{transform:scale(1.06)}
.gallery-vbg{width:100%;height:100%;background:linear-gradient(135deg,#0f1f3d,#1d3d6e);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.gallery-vbg .gv-play{font-size:40px;opacity:.65}
.gallery-vbg .gv-title{font-size:12px;color:rgba(255,255,255,.5);padding:0 12px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90%}
/* GALLERY OVERLAY (hover) */
.gallery-overlay{position:absolute;inset:0;background:linear-gradient(transparent 35%,rgba(0,0,0,.88));opacity:0;transition:opacity .25s;display:flex;flex-direction:column;justify-content:flex-end;padding:14px}
.gallery-item:hover .gallery-overlay{opacity:1}
.g-title{color:#fff;font-size:14px;font-weight:600;margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g-meta{display:flex;align-items:center;justify-content:space-between}
.g-cat{background:rgba(255,255,255,.18);backdrop-filter:blur(4px);border-radius:20px;padding:2px 10px;font-size:11px;color:rgba(255,255,255,.85);font-weight:600}
.g-del{background:rgba(220,38,38,.75);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
.g-del:hover{background:rgba(220,38,38,1)}
/* PLAY ICON for videos */
.g-play-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.82);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 20px rgba(0,0,0,.35);pointer-events:none;transition:transform .25s,opacity .25s}
.gallery-item:hover .g-play-icon{transform:translate(-50%,-50%) scale(1.12);opacity:.95}
/* EMPTY */
.empty{text-align:center;padding:80px 20px;color:var(--sub)}
.empty p{font-size:44px;margin-bottom:12px}
.empty span{font-size:15px;display:block;margin-bottom:20px}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,31,61,.52);backdrop-filter:blur(5px);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:20px;width:500px;max-width:94vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(15,31,61,.3);animation:pop .2s ease}
@keyframes pop{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
.modal-hd{padding:20px 22px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-hd h3{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--sub);line-height:1;padding:2px 6px}
.modal-body{padding:18px 22px}
.modal-foot{padding:0 22px 18px;display:flex;justify-content:flex-end;gap:8px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--sub);margin-bottom:5px;letter-spacing:.3px;text-transform:uppercase}
.field input,.field select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;background:#fafbfe}
.field input:focus,.field select:focus{border-color:var(--accent);background:#fff}
/* TYPE TOGGLE */
.type-toggle{display:flex;gap:8px;margin-bottom:16px}
.type-btn{flex:1;padding:11px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--sub)}
.type-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* UPLOAD AREA */
.upload-area{position:relative;border:2px dashed var(--border);border-radius:12px;padding:22px 16px;text-align:center;cursor:pointer;transition:all .2s;background:#fafbfe}
.upload-area:hover,.upload-area.drag{border-color:var(--accent);background:#eaf3ff}
.upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.ua-icon{font-size:26px;margin-bottom:5px}
.ua-text{font-size:13px;color:var(--sub);font-weight:500}
.ua-sub{font-size:11px;color:var(--sub);margin-top:2px;opacity:.65}
.upload-preview{width:100%;max-height:140px;object-fit:cover;border-radius:8px;margin-top:10px;display:none}
/* DIVIDER */
.divider-or{text-align:center;color:var(--sub);font-size:12px;margin:12px 0;position:relative}
.divider-or::before,.divider-or::after{content:'';position:absolute;top:50%;width:44%;height:1px;background:var(--border)}
.divider-or::before{left:0}.divider-or::after{right:0}
/* LIGHTBOX */
.lb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:500;display:none;align-items:center;justify-content:center}
.lb-overlay.open{display:flex}
.lb-topbar{position:absolute;top:0;left:0;right:0;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(rgba(0,0,0,.65),transparent);z-index:10;gap:10px}
.lb-titlewrap{display:flex;align-items:center;gap:8px;min-width:0}
.lb-title{color:#fff;font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-cat{background:rgba(255,255,255,.15);border-radius:20px;padding:2px 11px;font-size:11px;color:rgba(255,255,255,.8);font-weight:600;flex-shrink:0}
.lb-close-btn{background:rgba(255,255,255,.12);border:none;color:#fff;font-size:20px;cursor:pointer;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
.lb-close-btn:hover{background:rgba(255,255,255,.25)}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.12);border:none;color:#fff;font-size:36px;cursor:pointer;border-radius:50%;width:56px;height:56px;display:flex;align-items:center;justify-content:center;transition:background .2s;z-index:10;line-height:1;padding-bottom:2px}
.lb-nav:hover{background:rgba(255,255,255,.25)}
#lb-prev{left:16px}#lb-next{right:16px}
.lb-center{display:flex;align-items:center;justify-content:center;width:100%;height:100%;padding:60px 80px 50px}
#lb-content{display:flex;align-items:center;justify-content:center;max-width:100%;max-height:100%}
#lb-content img{max-width:90vw;max-height:85vh;object-fit:contain;display:block;border-radius:2px}
#lb-content video{max-width:90vw;max-height:85vh;background:#000;display:block}
.yt-lb{width:min(90vw,1140px);aspect-ratio:16/9}
.yt-lb iframe{width:100%;height:100%;border:none;display:block}
.lb-bottom{position:absolute;bottom:0;left:0;right:0;padding:14px 20px;background:linear-gradient(transparent,rgba(0,0,0,.55));text-align:center;z-index:10}
.lb-counter{color:rgba(255,255,255,.4);font-size:13px}
/* TOAST */
#toast{position:fixed;bottom:22px;right:22px;background:var(--navy);color:#fff;padding:11px 18px;border-radius:11px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(15,31,61,.3);z-index:600;display:none;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(max-width:700px){
  .hd{padding:13px 14px}.wrap{padding:18px 12px 48px}
  .gallery-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
  .lb-center{padding:50px 50px 40px}
  .lb-nav{width:42px;height:42px;font-size:28px}
  #lb-prev{left:6px}#lb-next{right:6px}
}
</style>
</head>
<body>
<div class="hd">
  <div class="hd-left"><h1>포트폴리오</h1><p>SBS아카데미 구월점 · 수업 작업물 갤러리</p></div>
  <div class="hd-right">
    <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ 작업물 추가</button>
    <a href="students.html" class="btn btn-ghost btn-sm">👥 수강생 관리</a>
  </div>
</div>

<div id="app"></div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-box"></div>
</div>

<div id="lightbox" class="lb-overlay">
  <div class="lb-topbar">
    <div class="lb-titlewrap">
      <span id="lb-title" class="lb-title"></span>
      <span id="lb-cat" class="lb-cat"></span>
    </div>
    <button class="lb-close-btn" onclick="closeLightbox()">✕</button>
  </div>
  <button id="lb-prev" class="lb-nav" onclick="lbNav(-1)">‹</button>
  <div class="lb-center"><div id="lb-content"></div></div>
  <button id="lb-next" class="lb-nav" onclick="lbNav(1)">›</button>
  <div class="lb-bottom"><span id="lb-counter" class="lb-counter"></span></div>
</div>

<div id="toast"></div>

<script>
const CATS=['전체','영상/모션2D','영상/모션3D','시각편집','아트웍','인테리어','CG/마야','웹'];

const DB={
  KEY:'sbs_portfolio_v1',
  get(){try{const r=localStorage.getItem(this.KEY);return r?JSON.parse(r):{items:[]};}catch(e){return {items:[];};}},
  save(d){localStorage.setItem(this.KEY,JSON.stringify(d));return d;}
};

let TAB='전체';
let UPLOAD_TYPE='image';
let LB_ITEMS=[];
let LB_IDX=0;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function ytId(url){const m=String(url||'').match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/);return m?m[1]:null}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function showToast(msg,ms=2500){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',ms)}

function renderApp(){
  const d=DB.get();
  const all=d.items||[];
  const list=TAB==='전체'?all:all.filter(x=>x.category===TAB);
  const counts=Object.fromEntries(CATS.map(c=>[c,c==='전체'?all.length:all.filter(x=>x.category===c).length]));

  document.getElementById('app').innerHTML=`
    <div class="wrap">
      <div class="tabs">
        ${CATS.map(c=>`<button class="tab ${TAB===c?'ta':''}" onclick="setTab('${esc(c)}')">${esc(c)}<span class="tcnt">${counts[c]}</span></button>`).join('')}
      </div>
      ${list.length
        ?`<div class="gallery-grid">${list.map((item,idx)=>renderCard(item,idx)).join('')}</div>`
        :`<div class="empty"><p>🎬</p><span>아직 업로드된 작업물이 없습니다</span>
           <button class="btn btn-primary" onclick="openAddModal()">+ 작업물 추가</button></div>`}
    </div>`;
}

function renderCard(item,idx){
  const isVideo=item.type==='video';
  const vid=isVideo?ytId(item.url):null;
  let thumb='';
  if(item.type==='image'){
    thumb=`<img src="${esc(item.url)}" alt="${esc(item.title||'')}">`;
  }else if(vid){
    thumb=`<img src="https://img.youtube.com/vi/${vid}/mqdefault.jpg" alt="${esc(item.title||'')}">`;
  }else{
    thumb=`<div class="gallery-vbg"><div class="gv-play">▶</div><div class="gv-title">${esc(item.title||'영상')}</div></div>`;
  }
  return `<div class="gallery-item" onclick="openLightbox(${idx})">
    ${thumb}
    ${isVideo?'<div class="g-play-icon">▶</div>':''}
    <div class="gallery-overlay">
      <div class="g-title">${esc(item.title||'제목 없음')}</div>
      <div class="g-meta">
        <span class="g-cat">${esc(item.category||'')}</span>
        <button class="g-del" onclick="event.stopPropagation();deleteItem('${esc(item.id)}')">✕</button>
      </div>
    </div>
  </div>`;
}

function setTab(t){TAB=t;renderApp();}

/* ── ADD MODAL ── */
function openAddModal(){
  UPLOAD_TYPE='image';
  const defaultCat=TAB==='전체'?'영상/모션2D':TAB;
  openModal(`<div class="modal-hd"><h3>작업물 추가</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="type-toggle">
        <button class="type-btn active" id="ut-img" onclick="setType('image')">🖼 이미지</button>
        <button class="type-btn" id="ut-vid" onclick="setType('video')">▶ 영상</button>
      </div>
      <div class="field"><label>파일 업로드</label>
        <div class="upload-area" id="ua">
          <input type="file" id="uf-file" accept="image/*" onchange="onFileSelect(this)">
          <div class="ua-icon">📁</div>
          <div class="ua-text">클릭하여 파일 선택</div>
          <div class="ua-sub">이미지: JPG · PNG · GIF &nbsp;|&nbsp; 영상: MP4 · MOV</div>
        </div>
        <img id="uf-preview" class="upload-preview" alt="미리보기">
      </div>
      <div class="divider-or">또는</div>
      <div class="field"><label>URL (유튜브 포함)</label><input id="uf-url" placeholder="https://..."></div>
      <div class="field"><label>제목</label><input id="uf-title" placeholder="작품 제목"></div>
      <div class="field"><label>학과 / 카테고리</label>
        <select id="uf-cat">${CATS.filter(c=>c!=='전체').map(c=>`<option value="${c}"${c===defaultCat?' selected':''}>${c}</option>`).join('')}</select>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveItem()">추가</button>
    </div>`);
}

function setType(t){
  UPLOAD_TYPE=t;
  document.getElementById('ut-img').classList.toggle('active',t==='image');
  document.getElementById('ut-vid').classList.toggle('active',t==='video');
  const fi=document.getElementById('uf-file');
  if(fi)fi.accept=t==='image'?'image/*':'video/*';
  const p=document.getElementById('uf-preview');
  if(p)p.style.display='none';
  const ua=document.getElementById('ua');
  if(ua)ua.querySelector('.ua-sub').textContent=t==='image'?'JPG · PNG · GIF · WEBP':'MP4 · MOV · WEBM';
}

function onFileSelect(input){
  if(!input.files||!input.files[0])return;
  const file=input.files[0];
  const ua=document.getElementById('ua');
  if(ua)ua.querySelector('.ua-text').textContent='✓ '+file.name;
  const titleEl=document.getElementById('uf-title');
  if(titleEl&&!titleEl.value)titleEl.value=file.name.replace(/\.[^.]+$/,'');
  if(UPLOAD_TYPE==='image'){
    const reader=new FileReader();
    reader.onload=e=>{const p=document.getElementById('uf-preview');if(p){p.src=e.target.result;p.style.display='block';}};
    reader.readAsDataURL(file);
  }
}

function saveItem(){
  const fileInput=document.getElementById('uf-file');
  const url=(document.getElementById('uf-url').value||'').trim();
  const title=(document.getElementById('uf-title').value||'').trim();
  const category=document.getElementById('uf-cat').value;
  const type=UPLOAD_TYPE;
  if(fileInput&&fileInput.files&&fileInput.files[0]){
    showToast('파일 처리 중...', 30000);
    const reader=new FileReader();
    reader.onload=e=>_commit({id:uid(),type,url:e.target.result,title:title||fileInput.files[0].name,category,addedAt:Date.now()});
    reader.onerror=()=>showToast('파일 읽기 실패');
    reader.readAsDataURL(fileInput.files[0]);
  }else if(url){
    _commit({id:uid(),type,url,title:title||url,category,addedAt:Date.now()});
  }else{
    alert('파일을 선택하거나 URL을 입력하세요.');
  }
}

function _commit(item){
  const d=DB.get();
  if(!d.items)d.items=[];
  d.items.unshift(item);
  try{
    DB.save(d);
    closeModal();
    TAB=item.category;
    renderApp();
    showToast('추가됨 ✓');
  }catch(e){
    d.items.shift();
    showToast('저장 실패: 파일이 너무 큽니다. URL을 사용하거나 파일을 압축하세요.',5000);
  }
}

function deleteItem(id){
  if(!confirm('이 작업물을 삭제하시겠습니까?'))return;
  const d=DB.get();
  d.items=(d.items||[]).filter(x=>x.id!==id);
  DB.save(d);renderApp();showToast('삭제됨');
}

/* ── LIGHTBOX ── */
function openLightbox(idx){
  const d=DB.get();
  LB_ITEMS=TAB==='전체'?[...(d.items||[])]:(d.items||[]).filter(x=>x.category===TAB);
  LB_IDX=idx;
  renderLightbox();
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lb-content').innerHTML='';
}

function lbNav(dir){
  const n=LB_IDX+dir;
  if(n<0||n>=LB_ITEMS.length)return;
  LB_IDX=n;renderLightbox();
}

function renderLightbox(){
  const item=LB_ITEMS[LB_IDX];if(!item)return;
  let content='';
  if(item.type==='image'){
    content=`<img src="${esc(item.url)}" alt="${esc(item.title||'')}">`;
  }else{
    const vid=ytId(item.url);
    if(vid)content=`<div class="yt-lb"><iframe src="https://www.youtube.com/embed/${vid}?autoplay=1" allowfullscreen allow="autoplay" style="width:100%;height:100%;border:none;display:block"></iframe></div>`;
    else content=`<video src="${esc(item.url)}" controls autoplay></video>`;
  }
  document.getElementById('lb-content').innerHTML=content;
  document.getElementById('lb-title').textContent=item.title||'';
  document.getElementById('lb-cat').textContent=item.category||'';
  document.getElementById('lb-counter').textContent=`${LB_IDX+1} / ${LB_ITEMS.length}`;
  document.getElementById('lb-prev').style.display=LB_IDX>0?'flex':'none';
  document.getElementById('lb-next').style.display=LB_IDX<LB_ITEMS.length-1?'flex':'none';
}

/* ── MODAL ── */
function openModal(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('modal-overlay').classList.add('open');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}

document.addEventListener('keydown',e=>{
  if(document.getElementById('lightbox').classList.contains('open')){
    if(e.key==='Escape')closeLightbox();
    if(e.key==='ArrowLeft')lbNav(-1);
    if(e.key==='ArrowRight')lbNav(1);
    return;
  }
  if(e.key==='Escape')closeModal();
});

renderApp();
</script>
</body>
</html>
