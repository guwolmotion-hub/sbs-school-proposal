<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이예준 | SBS아카데미 구월점</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #f4f6fb; --card: #ffffff; --border: #e0e6f0; --text: #1a2540; --sub: #6b7a99; --accent: #3a7bd5; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .hero { background: linear-gradient(135deg, #1d3d6e, #3a7bd5); padding: 48px 40px 40px; color: #fff; }
    .class-tag { display: inline-block; background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.3); border-radius: 20px; padding: 4px 14px; font-size: 12px; font-weight: 600; letter-spacing: .3px; margin-bottom: 14px; }
    .hero h1 { font-size: 36px; font-weight: 700; letter-spacing: -.5px; margin-bottom: 8px; }
    .hero .mentor-line { font-size: 14px; color: rgba(255,255,255,.7); }
    .container { max-width: 800px; margin: 0 auto; padding: 32px 24px 60px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .info-card { background: var(--card); border-radius: 14px; padding: 20px 22px; box-shadow: 0 2px 12px rgba(15,31,61,.07); border: 1px solid var(--border); page-break-inside: avoid; break-inside: avoid; }
    .info-card label { font-size: 11px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; color: var(--sub); display: block; margin-bottom: 8px; }
    .info-card .val { font-size: 16px; font-weight: 600; color: var(--text); }
    .badge { display: inline-block; padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
    .badge-making { background: #fff3e0; color: #d97706; }
    .progress-card { background: var(--card); border-radius: 14px; padding: 22px 24px; box-shadow: 0 2px 12px rgba(15,31,61,.07); border: 1px solid var(--border); margin-bottom: 20px; page-break-inside: avoid; break-inside: avoid; }
    .progress-card label { font-size: 11px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; color: var(--sub); display: block; margin-bottom: 12px; }
    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .progress-pct { font-size: 28px; font-weight: 700; color: var(--accent); }
    .progress-track { background: var(--border); border-radius: 99px; height: 10px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #3a7bd5, #60a5fa); }
    .memo-card { background: var(--card); border-radius: 14px; padding: 22px 24px; box-shadow: 0 2px 12px rgba(15,31,61,.07); border: 1px solid var(--border); margin-bottom: 28px; page-break-inside: avoid; break-inside: avoid; }
    .memo-card label { font-size: 11px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; color: var(--sub); display: block; margin-bottom: 12px; }
    .memo-text { font-size: 15px; line-height: 1.7; color: var(--text); }
    .back-btn { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; color: var(--sub); font-size: 14px; font-weight: 500; padding: 10px 18px; border-radius: 10px; background: var(--card); border: 1px solid var(--border); box-shadow: 0 1px 6px rgba(15,31,61,.06); transition: all .2s; }
    .back-btn:hover { color: var(--accent); border-color: var(--accent); background: #eaf3ff; }
    @media (max-width: 600px) { .hero { padding: 36px 20px 28px; } .hero h1 { font-size: 28px; } .container { padding: 24px 16px 48px; } .info-grid { grid-template-columns: 1fr; } }
    @media print { * { -webkit-print-color-adjust: exact; print-color-adjust: exact; } .back-btn { display: none !important; } .info-card, .progress-card, .memo-card { page-break-inside: avoid; break-inside: avoid; } h1, h2 { page-break-after: avoid; } a[href]::after { content: none !important; } }
  </style>
</head>
<body>
<div class="hero">
  <div class="class-tag">입시반</div>
  <h1>이예준</h1>
  <div class="mentor-line">담당 멘토: 문예주</div>
</div>
<div class="container">
  <div class="info-grid">
    <div class="info-card"><label>포트폴리오 주제</label><div class="val">모션포폴2D</div></div>
    <div class="info-card"><label>진행 단계</label><div class="val"><span class="badge badge-making">제작중</span></div></div>
    <div class="info-card"><label>나이</label><div class="val">16세</div></div>
    <div class="info-card"><label>연락처</label><div class="val">010-8561-3609</div></div>
  </div>
  <div class="progress-card">
    <label>포트폴리오 진행률</label>
    <div class="progress-header">
      <span style="font-size:14px;color:var(--sub);">현재 진행 상황</span>
      <span class="progress-pct">40%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:40%"></div></div>
  </div>
  <div class="memo-card"><label>메모 / 특이사항</label><div class="memo-text">포트폴리오 진행 중.</div></div>
  <a class="back-btn" href="../students.html">← 목록으로 돌아가기</a>
</div>
</body>
</html>
